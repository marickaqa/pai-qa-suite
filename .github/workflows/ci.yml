name: QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core-api:
    name: Core API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run test:core
        env:
          API_EMAIL: ${{ secrets.API_EMAIL }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          SAAS_EMAIL: ${{ secrets.SAAS_EMAIL }}
          SAAS_PASSWORD: ${{ secrets.SAAS_PASSWORD }}
          API_BASE_URL: https://pc-be-dev.noctocode.dev
          CHAT_URL: https://pc-fe-dev.noctocode.dev

  core-ui:
    name: Core UI Tests
    runs-on: ubuntu-latest
    needs: core-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:ui:core
        env:
          API_EMAIL: ${{ secrets.API_EMAIL }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          SAAS_EMAIL: ${{ secrets.SAAS_EMAIL }}
          SAAS_PASSWORD: ${{ secrets.SAAS_PASSWORD }}
          API_BASE_URL: https://pc-be-dev.noctocode.dev
          CHAT_URL: https://pc-fe-dev.noctocode.dev
          SAAS_URL: https://chat.paicloud.ai
          SUBTITLES_URL: https://subtitles-dev.paicloud.ai
          SUBTITLES_QA_EMAIL: ${{ secrets.SUBTITLES_QA_EMAIL }}
          SUBTITLES_QA_PASSWORD: ${{ secrets.SUBTITLES_QA_PASSWORD }}

  known-bugs:
    name: Known Bug Tests (non-blocking)
    runs-on: ubuntu-latest
    if: always()
    needs: [core-api, core-ui]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:bugs || true
        env:
          API_EMAIL: ${{ secrets.API_EMAIL }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          SAAS_EMAIL: ${{ secrets.SAAS_EMAIL }}
          SAAS_PASSWORD: ${{ secrets.SAAS_PASSWORD }}
          API_BASE_URL: https://pc-be-dev.noctocode.dev
          CHAT_URL: https://pc-fe-dev.noctocode.dev
          SAAS_URL: https://chat.paicloud.ai
      - run: npm run test:ui:bugs || true
        env:
          API_EMAIL: ${{ secrets.API_EMAIL }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          SAAS_EMAIL: ${{ secrets.SAAS_EMAIL }}
          SAAS_PASSWORD: ${{ secrets.SAAS_PASSWORD }}
          API_BASE_URL: https://pc-be-dev.noctocode.dev
          CHAT_URL: https://pc-fe-dev.noctocode.dev
          SAAS_URL: https://chat.paicloud.ai
          SUBTITLES_URL: https://subtitles-dev.paicloud.ai
          SUBTITLES_NO_TENANT_EMAIL: ${{ secrets.SUBTITLES_NO_TENANT_EMAIL }}
          SUBTITLES_NO_TENANT_PASSWORD: ${{ secrets.SUBTITLES_NO_TENANT_PASSWORD }}

  monitoring:
    name: Monitoring (informational)
    runs-on: ubuntu-latest
    if: always()
    needs: [core-api, core-ui]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run test:monitoring || true
        env:
          API_EMAIL: ${{ secrets.API_EMAIL }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          API_BASE_URL: https://pc-be-dev.noctocode.dev
          CHAT_URL: https://pc-fe-dev.noctocode.dev
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}